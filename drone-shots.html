<head>

<body class="min-h-screen">

<div id="navbar-placeholder"></div>

<!-- Assets -->
<script src="assets/portfolio.js" defer></script>

<div class="pt-16 md:pt-20">
  
  <!-- Page Header -->
  <section id="page-header" class="pt-6 pb-6 md:py-12 border-b border-border">
    <div class="max-w-7xl mx-auto px-6 sm:px-10">
      <div class="flex flex-col md:flex-row items-start md:items-end justify-between gap-6">
        <div>
          <p id="header-eyebrow" class="gsap-header-item text-text-muted text-xs font-bold uppercase mb-4">Category 01</p>
          <h1 id="header-title" class="gsap-header-item text-4xl sm:text-5xl text-white font-bold">Drone Shots</h1>
          <p id="header-desc" class="gsap-header-item text-text-muted text-lg max-w-lg mt-4">Aerial perspectives. Landscapes, campuses, and skylines seen from above.</p>
        </div>
        <div class="flex justify-end">
          <p id="photo-count" class="gsap-header-item text-text-muted text-xs font-bold"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Gallery Grid -->
  <section class="pt-2 pb-6 md:py-12">
    <div class="max-w-7xl mx-auto px-6 sm:px-10">
      <div class="gallery-grid" id="main-grid"></div>
    </div>
  </section>

</div>

<script src="assets/gallery-data.js"></script>
<script>
  const allPhotos = window.galleryData.drone.map((p, i) => {
    const base = p.file.replace(/\.[^/.]+$/, "");
    return {
      id: i,
      src: 'images/Drone%20Shots/' + p.file,
      srcDecoded: 'images/Drone Shots/' + p.file,
      subfolder: 'Drone%20Shots',
      base: base,
      alt: p.alt || ('Drone aerial photograph by JC Niñonuevo — ' + base)
    };
  });

  function buildCard(p, gallery) {
    const wrap = document.createElement('div');
    wrap.className = 'gallery-item relative rounded-xl overflow-hidden cursor-pointer';
    const b = p.base;
    const sf = p.subfolder;
    wrap.innerHTML = `
      <picture>
        <source
          type="image/webp"
          srcset="
            images/optimized/800/${sf}/${b}-800.webp 800w,
            images/optimized/1200/${sf}/${b}-1200.webp 1200w,
            images/optimized/1600/${sf}/${b}-1600.webp 1600w
          "
          sizes="(max-width: 600px) 100vw, (max-width: 1024px) 50vw, 33vw"
        />
        <img
          src="images/optimized/1200/${sf}/${b}-1200.webp"
          alt="${p.alt}"
          loading="lazy"
          decoding="async"
          class="w-full h-auto block"
          onerror="this.parentElement.parentElement.querySelector('img').src='${p.src}'" />
      </picture>
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300 flex items-end p-5">
        <div class="flex justify-between items-end w-full">
          <svg class="w-5 h-5 text-white opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
      </div>
    `;
    wrap.addEventListener('click', () => openLightbox(p, gallery));
    return wrap;
  }

  function renderGrid() {
    const grid = document.getElementById('main-grid');
    if(!grid) return;
    grid.innerHTML = '';
    document.getElementById('photo-count').textContent = allPhotos.length + ' photos';
    allPhotos.forEach(p => grid.appendChild(buildCard(p, allPhotos)));

    // GSAP: animate gallery items after DOM is ready
    requestAnimationFrame(() => {
      ScrollTrigger.batch('#main-grid .gallery-item', {
        onEnter: batch => gsap.fromTo(batch,
          { y: 50, opacity: 0 },
          {
            y: 0, opacity: 1,
            duration: 0.6,
            stagger: 0.07,
            ease: 'power3.out',
            clearProps: 'transform,opacity'
          }
        ),
        once: true,
        start: 'top 95%'
      });
    });
  }

  document.addEventListener('DOMContentLoaded', renderGrid);
</script>

<div id="footer-placeholder"></div>


<!-- Lightbox -->
<div id="lightbox-placeholder"></div>



<!-- GSAP + ScrollTrigger -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    gsap.registerPlugin(ScrollTrigger);

    // ── 2. PAGE HEADER: staggered timeline on load (above fold, no ScrollTrigger needed)
    const headerTl = gsap.timeline({ delay: 0.3 });
    headerTl
      .fromTo('#header-eyebrow',
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }
      )
      .fromTo('#header-title',
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' },
        '-=0.35'
      )
      .fromTo('#header-desc',
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' },
        '-=0.4'
      )
      .fromTo('#photo-count',
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' },
        '-=0.3'
      );

    // ── 3. FOOTER: fade up on scroll
    gsap.fromTo('#site-footer',
      { y: 30, opacity: 0 },
      {
        y: 0, opacity: 1,
        duration: 0.6, ease: 'power2.out',
        scrollTrigger: {
          trigger: '#site-footer',
          start: 'top 95%',
          once: true
        }
      }
    );
  });
</script>

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
