<script>
  const videos = window.galleryData.videos;

  function renderVideoGrid() {
    const grid = document.getElementById('video-grid');
    if(!grid) return;
    grid.innerHTML = '';
    videos.forEach(v => {
      const card = document.createElement('div');
      card.className = 'video-card group relative rounded-xl overflow-hidden cursor-pointer bg-surface border border-border hover:border-white/30 transition-all duration-300';
      const videoSrc = `https://www.youtube-nocookie.com/embed/${v.youtubeId}`;
      card.innerHTML = `
        <div class="relative aspect-video overflow-hidden bg-bg">
          <img src="${v.thumb}" alt="${v.title} — video thumbnail"
            loading="lazy" decoding="async"
            class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all duration-500"
            onerror="this.src='${v.thumbFallback}'" />
          
          <!-- B-roll dynamic hover loop container -->
          <div class="hover-iframe-container absolute inset-0 overflow-hidden bg-black pointer-events-none"></div>

          <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10 group-hover:scale-90 transition-transform duration-300">
            <div class="w-16 h-16 rounded-full border border-white/30 flex items-center justify-center
              group-hover:border-white group-hover:scale-110 transition-all duration-300 bg-black/50 backdrop-blur-sm shadow-xl">
              <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <span class="absolute bottom-3 right-3 text-white/70 text-xs font-bold bg-black/50 px-2 py-1 rounded z-10">${v.duration}</span>
        </div>
        <div class="p-5">
          <h3 class="text-white font-bold text-lg">${v.title}</h3>
        </div>
      `;

      // Hover B-roll playing loop logic
      let hoverTimeout = null;
      card.addEventListener('mouseenter', () => {
        hoverTimeout = setTimeout(() => {
          const container = card.querySelector('.hover-iframe-container');
          if (container) {
            container.innerHTML = `
              <iframe class="w-[140%] h-[140%] absolute -top-[20%] -left-[20%] pointer-events-none"
                src="https://www.youtube-nocookie.com/embed/${v.youtubeId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${v.youtubeId}&rel=0&showinfo=0&iv_load_policy=3&modestbranding=1&disablekb=1"
                frameborder="0" allow="autoplay; encrypted-media">
              </iframe>
            `;
            container.classList.add('active');
          }
        }, 400); // 400ms delay protects against fast cursor sweeps
      });

      card.addEventListener('mouseleave', () => {
        clearTimeout(hoverTimeout);
        const container = card.querySelector('.hover-iframe-container');
        if (container) {
          container.classList.remove('active');
          setTimeout(() => {
            if (!container.classList.contains('active')) {
              container.innerHTML = '';
            }
          }, 500);
        }
      });

      card.addEventListener('click', () => openVideoLightbox(videoSrc, v.title));
      grid.appendChild(card);
    });
  }
</script>

<!-- GSAP + ScrollTrigger -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>

<script>
  gsap.registerPlugin(ScrollTrigger);


  // ── 2. PAGE HEADER: staggered timeline on load (above fold — no ScrollTrigger)
  const headerTl = gsap.timeline({ delay: 0.3 });
  headerTl
    .fromTo('#header-eyebrow',
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }
    )
    .fromTo('#header-title',
      { opacity: 0, y: 30 },
      { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' },
      '-=0.35'
    )
    .fromTo('#header-desc',
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' },
      '-=0.4'
    );

  // ── 3. VIDEO CARDS: fromTo with ScrollTrigger — safe, explicit states
  // Only 6 cards so stagger is fast; ScrollTrigger handles near-fold edge case
gsap.fromTo('#video-grid .video-card',   // ← add #video-grid here
    { y: 40, opacity: 0 },
    {
      y: 0, opacity: 1,
      duration: 0.65,
      stagger: 0.1,
      ease: 'power3.out',
      scrollTrigger: {
        trigger: '#video-grid',
        start: 'top 88%',
        once: true
      }
    }
  );

  // ── 4. FOOTER: fade up on scroll
  gsap.fromTo('#site-footer',
    { y: 30, opacity: 0 },
    {
      y: 0, opacity: 1,
      duration: 0.6, ease: 'power2.out',
      scrollTrigger: {
        trigger: '#site-footer',
        start: 'top 95%',
        once: true
      }
    }
  );

  // ── 5. CHANNEL DIVIDER: staggered text on scroll
gsap.fromTo(['#ch2-logo', '#ch2-eyebrow', '#ch2-title', '#ch2-desc'],
  { opacity: 0, y: 20 },
  {
    opacity: 1, y: 0,
    duration: 0.6,
    stagger: 0.12,
    ease: 'power3.out',
    scrollTrigger: {
      trigger: '#channel-divider',
      start: 'top 85%',
      once: true
    }
  }
);

// ── 6. SECOND CHANNEL CARDS: same stagger as grid 1
gsap.fromTo('#video-grid-2 .video-card',
  { y: 40, opacity: 0 },
  {
    y: 0, opacity: 1,
    duration: 0.65,
    stagger: 0.1,
    ease: 'power3.out',
    scrollTrigger: {
      trigger: '#video-grid-2',
      start: 'top 88%',
      once: true
    }
  }
);

</script>
