<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Framed Moments | JC Niñonuevo</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  
  <!-- SEO & Metadata -->
  <meta name="description" content="A collection of quick glimpses — peaceful nature scenes and busy city lights. Street and editorial photography by JC Niñonuevo.">
  
  <!-- Open Graph / Facebook -->

  <meta property="og:image" content="images/Framed%20Moments/FM-01.JPG">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Framed Moments | JC Niñonuevo">
  <meta name="twitter:description" content="A collection of quick glimpses — peaceful nature scenes and busy city lights.">
  <meta name="twitter:image" content="images/Framed%20Moments/FM-01.JPG">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/portfolio.css">
  
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'bg':    '#000000',
          'surface': '#0f0f0f',
          'border': '#1f1f1f',
          'text-main': '#ffffff',
          'text-muted': '#a0a0a0',
          'accent': '#ffffff',
        },
        fontFamily: {
          sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
        },
      },
    },
  }
</script>

</head>
<body class="min-h-screen">

<div id="navbar-placeholder"></div>

<!-- Assets -->
<script src="assets/portfolio.js" defer></script>

<div class="pt-16 md:pt-20">

  <!-- Page Header -->
  <section id="page-header" class="pt-6 pb-6 md:py-12 border-b border-border">
    <div class="max-w-7xl mx-auto px-6 sm:px-10">
      <div class="flex flex-col md:flex-row items-start md:items-end justify-between gap-6">
        <div>
          <p id="header-eyebrow" class="gsap-header-item text-text-muted text-xs font-bold uppercase mb-4">Category 02</p>
          <h1 id="header-title" class="gsap-header-item text-4xl sm:text-5xl text-white font-bold">Framed Moments</h1>
          <p id="header-desc" class="gsap-header-item text-text-muted text-lg max-w-lg mt-4">A collection of quick glimpses — peaceful nature scenes and busy city lights, caught between motion and quiet moments.</p>
        </div>
        <div class="flex justify-end">
          <p id="photo-count" class="gsap-header-item text-text-muted text-xs font-bold"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Gallery Grid -->
  <section class="pt-2 pb-6 md:py-12">
    <div class="max-w-7xl mx-auto px-6 sm:px-10">
      <div class="gallery-grid" id="main-grid"></div>
    </div>
  </section>
  <script>
  const imageFiles = [
    "FM-01.JPG","FM-02.JPG","FM-03.JPG","FM-04.JPG","FM-05.JPG",
    "FM-06.JPG","FM-07.JPG","FM-09.JPG","FM-10.JPG","FM-11.JPG",
    "FM-12.JPG","FM-13.JPG","FM-14.JPG","FM-15.JPG","FM-16.JPG",
    "FM-17.JPG","FM-18.JPG","FM-19.JPG","FM-20.JPG","FM-21.JPG",
    "FM-22.JPG","FM-23.JPG","FM-24.JPG","FM-25.JPG","FM-26.JPG",
    "FM-27.JPG","FM-28.JPG","FM-29.JPG","FM-30.JPG","FM-31.JPG",
    "FM-32.JPG","FM-33.JPG","FM-34.JPG","FM-35.JPG","FM-36.JPG",
    "FM-38.JPG","FM-39.JPG","FM-40.JPG","FM-41.JPG","FM-42.JPG",
    "FM-43.JPG","FM-44.JPG"
  ];

  const altTexts = [
    'Street portrait of a person in soft natural light, Bacolod City',
    'Candid editorial moment captured on a busy city street',
    'Quiet nature scene with layered foliage and dappled light',
    'Dramatic black and white street portrait in an urban setting',
    'Peaceful countryside landscape at soft golden hour',
    'Vibrant street scene with passing motorbikes and market stalls',
    'Close-up editorial portrait with bokeh background',
    'Silhouette of a person against a bright doorway frame',
    'Wide street scene showing everyday life in the Philippines',
    'Moody atmospheric photo of an alley and ambient light',
    'Documentary-style photo of local vendors and community',
    'Architectural detail of heritage facade and ornamental ironwork',
    'Environmental portrait of a subject in their natural space',
    'Travel photograph of a scenic viewpoint and mountain backdrop',
    'Street photography of a crowd in motion during an event',
    'Golden hour portrait with warm ambient city light',
    'Quiet dawn scene with mist over open fields',
    'Macro close-up of botanical detail and texture',
    'Candid street photograph of pedestrians and storefronts',
    'Portrait with strong directional shadow and high contrast',
    'Minimalist composition with geometric urban shapes',
    'Documentary image of everyday life in a Philippine barangay',
    'Reflective water surface with mirrored city skyline at night',
    'Low-angle street perspective looking up at building facades',
    'Soft editorial portrait of a subject in dappled shade',
    'Spontaneous candid moment caught in a public marketplace',
    'Textured wall detail with peeling paint and weathered surface',
    'Environmental portrait in a narrow heritage-district alley',
    'Long-exposure night photograph with light streaks and motion blur',
    'Travel portrait showing a subject against a scenic backdrop',
    'Moody close-up with selective focus on eyes and expression',
    'Street food scene with steam and warm ambient light',
    'Wide panoramic city scene during the blue hour of dusk',
    'Editorial portrait with bold geometric shadow and contrast',
    'Candid capture of a laugh and natural unposed expression',
    'Architectural photography of a heritage church facade',
    'Contemplative portrait in soft overcast light',
    'Street scene at twilight with glowing storefront signs',
    'Documentary photo of a festive community gathering',
    'Intimate editorial frame with shallow depth of field',
    'Travel photograph at a Philippine coastal town at low tide',
    'Soft silhouette portrait against an open evening sky',
  ];

  const allPhotos = imageFiles
    .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))
    .map((file, i) => {
      const base = file.replace(/\.jpe?g$/i, '');
      return {
        id: i,
        src: 'images/Framed%20Moments/' + file,
        subfolder: 'Framed Moments',
        base: base,
        alt: altTexts[i] || ('Street and editorial photograph by JC Niñonuevo — ' + base)
      };
    });

  function buildCard(p, gallery) {
    const wrap = document.createElement('div');
    wrap.className = 'gallery-item relative rounded-xl overflow-hidden cursor-pointer';
    const b = p.base;
    const sf = p.subfolder;
    wrap.innerHTML = `
      <picture>
        <source
          type="image/webp"
          srcset="
            images/optimized/800/${sf}/${b}-800.webp 800w,
            images/optimized/1200/${sf}/${b}-1200.webp 1200w,
            images/optimized/1600/${sf}/${b}-1600.webp 1600w
          "
          sizes="(max-width: 600px) 100vw, (max-width: 1024px) 50vw, 33vw"
        />
        <img
          src="images/optimized/1200/${sf}/${b}-1200.webp"
          alt="${p.alt}"
          loading="lazy"
          decoding="async"
          class="w-full h-auto block"
          onerror="this.parentElement.parentElement.querySelector('img').src='${p.src}'" />
      </picture>
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300 flex items-end p-5">
        <div class="flex justify-between items-end w-full">
          <svg class="w-5 h-5 text-white opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
      </div>
    `;
    wrap.addEventListener('click', () => openLightbox(p, gallery));
    return wrap;
  }

  function renderGrid() {
    const grid = document.getElementById('main-grid');
    if(!grid) return;
    grid.innerHTML = '';
    document.getElementById('photo-count').textContent = allPhotos.length + ' photos';
    allPhotos.forEach(p => grid.appendChild(buildCard(p, allPhotos)));

    // GSAP: batch animate gallery items as they enter viewport
    requestAnimationFrame(() => {
      ScrollTrigger.batch('#main-grid .gallery-item', {
        onEnter: batch => gsap.fromTo(batch,
          { y: 50, opacity: 0 },
          {
            y: 0, opacity: 1,
            duration: 0.6,
            stagger: 0.07,
            ease: 'power3.out',
            clearProps: 'transform,opacity'
          }
        ),
        once: true,
        start: 'top 95%'
      });
    });
  }

  document.addEventListener('DOMContentLoaded', renderGrid);
</script>

</div>

<div id="footer-placeholder"></div>


<!-- Lightbox -->
<div id="lightbox-placeholder"></div>



<!-- GSAP + ScrollTrigger -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>

<script>
  gsap.registerPlugin(ScrollTrigger);


  // ── 2. PAGE HEADER: staggered timeline on load (above fold — no ScrollTrigger)
  const headerTl = gsap.timeline({ delay: 0.3 });
  headerTl
    .fromTo('#header-eyebrow',
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }
    )
    .fromTo('#header-title',
      { opacity: 0, y: 30 },
      { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' },
      '-=0.35'
    )
    .fromTo('#header-desc',
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' },
      '-=0.4'
    )
    .fromTo('#photo-count',
      { opacity: 0, y: 10 },
      { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' },
      '-=0.3'
    );

  // ── 3. FOOTER: fade up on scroll
  gsap.fromTo('#site-footer',
    { y: 30, opacity: 0 },
    {
      y: 0, opacity: 1,
      duration: 0.6, ease: 'power2.out',
      scrollTrigger: {
        trigger: '#site-footer',
        start: 'top 95%',
        once: true
      }
    }
  );

  // Gallery items handled inside renderGrid() via ScrollTrigger.batch
</script>

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
