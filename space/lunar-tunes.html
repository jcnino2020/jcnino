<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNAR TUNES | Space Jam Reimagined</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #050505; overflow-x: hidden; }
        .font-display { font-family: 'Orbitron', sans-serif; }
        .jam-shadow { text-shadow: 0 0 20px rgba(168, 85, 247, 0.8), 0 0 40px rgba(168, 85, 247, 0.4); }
        .grid-bg {
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .visualizer-bar { transition: height 0.15s ease-in-out; }
    </style>
</head>
<body class="text-white min-h-screen relative selection:bg-purple-500 selection:text-white grid-bg">
    <div id="star-container" class="absolute inset-0 z-0 pointer-events-none"></div>

    <div class="relative z-10 max-w-4xl mx-auto px-6 py-12">
        <!-- Back Button -->
        <a href="index.html" class="inline-flex items-center gap-2 text-cyan-400 hover:text-pink-500 font-display text-sm font-bold tracking-widest mb-10 transition-colors">
            ← BACK TO ARCHIVE
        </a>

        <!-- Header -->
        <header class="mb-12">
            <span class="text-xs font-mono text-purple-400 tracking-[0.2em] font-bold uppercase">Soundtrack Broadcast</span>
            <h1 class="font-display font-black text-4xl md:text-6xl tracking-tight uppercase jam-shadow mt-2">
                Lunar Tunes
            </h1>
            <div class="mt-4 w-48 h-0.5 bg-gradient-to-r from-purple-500 to-transparent"></div>
        </header>

        <!-- Player Interface -->
        <main class="grid grid-cols-1 md:grid-cols-12 gap-8">
            <!-- Roster Left: Album Art & Player Control -->
            <div class="backdrop-blur-md bg-black/40 border border-white/10 rounded-2xl p-6 md:col-span-5 flex flex-col items-center justify-center space-y-6">
                <!-- Mock Artwork -->
                <div class="relative w-48 h-48 rounded-xl bg-gradient-to-br from-purple-600 to-pink-600 shadow-[0_0_30px_rgba(168,85,247,0.3)] flex items-center justify-center overflow-hidden group">
                    <span class="text-6xl group-hover:rotate-12 transition-transform duration-500">💿</span>
                </div>
                
                <div class="text-center">
                    <h3 id="current-track" class="font-display font-bold text-lg text-purple-400">Space Jam Main Theme</h3>
                    <p class="text-gray-400 text-xs mt-1">Quad City DJ's</p>
                </div>

                <!-- Visualizer -->
                <div class="flex items-end gap-1 h-8 w-32 justify-center">
                    <div class="visualizer-bar w-1.5 bg-purple-500 h-1/2"></div>
                    <div class="visualizer-bar w-1.5 bg-pink-500 h-2/3"></div>
                    <div class="visualizer-bar w-1.5 bg-purple-500 h-full"></div>
                    <div class="visualizer-bar w-1.5 bg-pink-500 h-1/3"></div>
                    <div class="visualizer-bar w-1.5 bg-purple-500 h-3/4"></div>
                </div>

                <!-- Controls -->
                <div class="flex gap-4">
                    <button class="bg-white/5 hover:bg-white/10 border border-white/10 p-3 rounded-full transition">⏮️</button>
                    <button id="play-btn" class="bg-purple-600 hover:bg-purple-500 p-3 px-6 rounded-full font-bold transition">PLAY</button>
                    <button class="bg-white/5 hover:bg-white/10 border border-white/10 p-3 rounded-full transition">⏭️</button>
                </div>
            </div>

            <!-- Track List Right -->
            <div class="backdrop-blur-md bg-black/40 border border-white/10 rounded-2xl p-6 md:col-span-7 space-y-4">
                <h4 class="font-display font-bold text-base text-gray-400 uppercase tracking-widest border-b border-white/5 pb-2">TRACKLISTINGS</h4>
                <div class="space-y-1">
                    <div onclick="selectTrack('Space Jam Main Theme', 'Quad City DJ\'s')" class="flex justify-between items-center p-2 rounded hover:bg-white/5 cursor-pointer text-purple-400 font-bold">
                        <span>1. Space Jam Main Theme</span>
                        <span class="text-xs font-mono text-gray-500">5:01</span>
                    </div>
                    <div onclick="selectTrack('I Believe I Can Fly', 'R. Kelly')" class="flex justify-between items-center p-2 rounded hover:bg-white/5 cursor-pointer">
                        <span>2. I Believe I Can Fly</span>
                        <span class="text-xs font-mono text-gray-500">5:22</span>
                    </div>
                    <div onclick="selectTrack('Hit \'Em High', 'B-Real, Coolio, Method Man, LL Cool J')" class="flex justify-between items-center p-2 rounded hover:bg-white/5 cursor-pointer">
                        <span>3. Hit 'Em High (The Monstars' Anthem)</span>
                        <span class="text-xs font-mono text-gray-500">4:17</span>
                    </div>
                    <div onclick="selectTrack('Fly Like an Eagle', 'Seal')" class="flex justify-between items-center p-2 rounded hover:bg-white/5 cursor-pointer">
                        <span>4. Fly Like an Eagle</span>
                        <span class="text-xs font-mono text-gray-500">4:14</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Background script -->
    <script>
        const starContainer = document.getElementById('star-container');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            const size = Math.random() * 3;
            star.className = 'absolute bg-white rounded-full opacity-0';
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            starContainer.appendChild(star);
            gsap.to(star, {
                opacity: Math.random(),
                duration: Math.random() * 2 + 1,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut"
            });
        }
        document.addEventListener('mousemove', (e) => {
            const mouseX = (e.clientX / window.innerWidth) - 0.5;
            const mouseY = (e.clientY / window.innerHeight) - 0.5;
            gsap.to("#star-container", { x: mouseX * -40, y: mouseY * -40, duration: 1.5, ease: "power1.out" });
        });

        // Player functions
        function selectTrack(name, artist) {
            document.getElementById('current-track').innerText = name;
            document.querySelector('#current-track + p').innerText = artist;
            
            // Highlight active in tracklist
            const items = document.querySelectorAll('.md\\:col-span-7 div div');
            items.forEach(el => {
                if (el.innerText.includes(name)) {
                    el.className = "flex justify-between items-center p-2 rounded bg-white/5 text-purple-400 font-bold cursor-pointer";
                } else {
                    el.className = "flex justify-between items-center p-2 rounded hover:bg-white/5 cursor-pointer";
                }
            });
        }

        // Active visualizer animation
        let isPlaying = false;
        const playBtn = document.getElementById('play-btn');
        const bars = document.querySelectorAll('.visualizer-bar');

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? "PAUSE" : "PLAY";
            if (isPlaying) {
                animateVisualizer();
            } else {
                bars.forEach(bar => bar.style.height = '10%');
            }
        });

        function animateVisualizer() {
            if (!isPlaying) return;
            bars.forEach(bar => {
                const height = Math.random() * 90 + 10;
                bar.style.height = `${height}%`;
            });
            setTimeout(animateVisualizer, 150);
        }
    </script>
</body>
</html>
