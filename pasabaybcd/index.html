<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PasabayBCD Admin</title>
  <link rel="icon" type="image/png" href="assets/app-icon.png">
  <link rel="shortcut icon" href="assets/app-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8f9ff;
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">
  <div class="w-full max-w-md bg-white rounded-lg shadow-xl p-8 border border-blue-50">
    <div class="text-center mb-8 flex flex-col items-center">
      <div
        class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center p-3 mb-4 shadow-lg shadow-blue-200">
        <img src="assets/images/logo-white.png" alt="Logo" class="w-full h-full"
          onerror="this.src='assets/app-icon.png'">
      </div>
      <h1 class="text-2xl font-bold text-gray-900">PasabayBCD</h1>
      <p class="text-sm text-gray-500 mt-1 uppercase tracking-widest font-semibold">Administration Portal</p>
    </div>

    <div id="error-msg"
      class="hidden mb-4 p-3 bg-red-50 border border-red-100 text-red-600 text-base font-bold rounded"></div>

    <form id="login-form" class="space-y-8">
      <div>
        <label class="block text-[12px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Email Address</label>
        <input type="email" id="email" required placeholder="admin@pasabaybcd.ph"
          class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-base">
      </div>
      <div>
        <label class="block text-[12px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Password</label>
        <input type="password" id="password" required placeholder="••••••••"
          class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-base">
      </div>
      <button type="submit" id="submit-btn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition-all shadow-lg active:scale-[0.98]">
        Sign In to Control Panel
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-[12px] text-gray-400 italic">Authorized personnel only. Access is monitored.</p>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      submitBtn.textContent = 'Authenticating...';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('adminName', data.user.name);
          localStorage.setItem('adminEmail', data.user.email);
          window.location.href = 'dashboard.html';
        } else {
          errorMsg.textContent = data.error || 'Invalid credentials';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Network or server error';
        errorMsg.classList.remove('hidden');
      } finally {
        submitBtn.textContent = 'Sign In to Control Panel';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
