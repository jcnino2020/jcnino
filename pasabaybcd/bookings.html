<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings - PasabayBCD</title>
<link rel="icon" type="image/png" href="assets/app-icon.png">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="js/auth.js"></script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { font-family: 'Inter', sans-serif; background: #f8f9ff; color: #1e293b; font-size: 15px; }
  .data-table thead tr { background: #f1f5f9; }
  .data-table thead th { font-size: 12px; font-weight: 800; text-transform: uppercase; color: #475569; padding: 14px 24px; border-bottom: 1px solid #e2e8f0; text-align: left;}
  .data-table tbody tr { border-bottom: 1px solid #f1f5f9; }
  .data-table tbody tr:hover { background: #eff4ff; }
  .data-table tbody td { padding: 16px 24px; font-size: 0.875rem; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; }
  .badge-transit { background:#dbeafe; color:#1d4ed8; }
  .badge-pending { background:#fef3c7; color:#b45309; }
  .badge-delivered { background:#dcfce7; color:#166534; }
  .badge-cancelled { background:#fee2e2; color:#b91c1c; }
</style>
</head>
<body class="min-h-screen overflow-x-hidden">

<main class="ml-0 md:ml-64 pt-24 pb-12 px-4 md:px-8 min-h-screen transition-all duration-300">
  <div class="max-w-[1600px] mx-auto space-y-8">
    <div class="flex items-center justify-between pb-2">
      <div>
        <h2 class="text-2xl font-bold tracking-tight text-gray-900">Manage Bookings</h2>
        <p class="text-base text-gray-500 mt-1">All cargo shipments</p>
      </div>
      <div class="text-right">
        <a href="add_booking.html" class="px-4 py-2 bg-blue-600 text-white font-bold rounded shadow hover:bg-blue-700 transition-colors inline-flex items-center gap-2">
          <span class="material-symbols-outlined">add</span> New Shipment
        </a>
      </div>
    </div>

    <div class="bg-white rounded overflow-hidden shadow-sm border border-gray-100">
      <div class="overflow-x-auto">
        <table class="w-full data-table">
          <thead>
            <tr>
              <th>Booking ID</th>
              <th>Date & Time</th>
              <th>Category</th>
              <th>Fee</th>
              <th>Driver</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookings-body">
            <tr><td colspan="6" class="text-center py-8 text-gray-400 text-base">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script src="js/layout.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/api/bookings');
      if (res.ok) {
        const bookings = await res.json();
        const tbody = document.getElementById('bookings-body');
        
        if (bookings && bookings.length > 0) {
          tbody.innerHTML = '';
          bookings.forEach(b => {
            const date = new Date(b.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            let statusClass = 'badge-pending';
            if (b.status === 'delivered') statusClass = 'badge-delivered';
            if (b.status === 'in transit') statusClass = 'badge-transit';
            if (b.status === 'cancelled') statusClass = 'badge-cancelled';

            const tr = document.createElement('tr');
            tr.innerHTML = \`
              <td class="font-bold text-blue-600">#\${b.id}</td>
              <td class="text-gray-700">\${date}</td>
              <td class="text-gray-600">\${b.cargo_category || 'N/A'}</td>
              <td class="font-bold text-gray-900">₱\${parseFloat(b.estimated_fee).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
              <td class="text-gray-600 font-medium">\${b.driver_name || 'Unassigned'}</td>
              <td><span class="badge \${statusClass}">\${b.status}</span></td>
            \`;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400 text-base">No bookings found.</td></tr>';
        }
      }
    } catch (err) {
      console.error('Failed to fetch bookings', err);
    }
  });
</script>
</body>
</html>
