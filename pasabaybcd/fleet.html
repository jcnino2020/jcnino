<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet - PasabayBCD</title>
<link rel="icon" type="image/png" href="assets/app-icon.png">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="js/auth.js"></script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  body { font-family: 'Inter', sans-serif; background: #f8f9ff; color: #1e293b; font-size: 15px; }
</style>
</head>
<body class="min-h-screen overflow-x-hidden">

<main class="ml-0 md:ml-64 pt-24 pb-12 px-4 md:px-8 min-h-screen transition-all duration-300">
  <div class="max-w-[1600px] mx-auto space-y-8">
    <div class="flex items-center justify-between pb-2">
      <div>
        <h2 class="text-2xl font-bold tracking-tight text-gray-900">Truck Fleet</h2>
        <p class="text-base text-gray-500 mt-1">Manage vehicles and routes</p>
      </div>
    </div>

    <div class="bg-white rounded p-8 shadow-sm border border-gray-100 text-center">
      <span class="material-symbols-outlined text-gray-300 text-6xl mb-4">construction</span>
      <h3 class="text-xl font-bold text-gray-900">Under Construction</h3>
      <p class="text-gray-500 mt-2">This feature is being migrated to the new Serverless API.</p>
    </div>
  </div>
</main>

<script src="js/layout.js"></script>
</body>
</html>
